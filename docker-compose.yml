services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: personality_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/personality_ai
      JWT_SECRET_KEY: development-secret-change-me
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5001:5001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
